server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend:4000;
  }

  location ~ ^/public/files/[^/]+/(preview|download)$ {
    proxy_pass http://backend:4000;
  }

  location /auth/ { proxy_pass http://backend:4000; }
  location /provider-configs/ { proxy_pass http://backend:4000; }
  location /connected-accounts/ { proxy_pass http://backend:4000; }
  location /storage/ { proxy_pass http://backend:4000; }
  location /uploads/ { proxy_pass http://backend:4000; }
  location /files/ { proxy_pass http://backend:4000; }
  location /folders/ { proxy_pass http://backend:4000; }
  location /invites/ { proxy_pass http://backend:4000; }
  location = /health { proxy_pass http://backend:4000; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
